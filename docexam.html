<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Countdown 2026 | Dept. of Computing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .gradient-text {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .exam-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .exam-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.07);
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .animate-pulse-slow {
            animation: pulse-slow 3s infinite;
        }

        .countdown-item {
            min-width: 80px;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12 animate-fade-in">
            <h2 class="text-sm font-bold tracking-widest text-blue-400 uppercase mb-2">Faculty of Applied Sciences</h2>
            <h1 class="text-3xl md:text-5xl font-extrabold mb-4">First Year End Semester Exam <span class="gradient-text">2026</span></h1>
            <p class="text-slate-400 text-lg">Department of Computing | Intake 2023/2024</p>
        </header>

        <!-- Main Countdown Section -->
        <div class="glass p-8 mb-10 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
            <h3 class="text-slate-400 font-semibold mb-6 uppercase tracking-wider">Countdown to First Paper</h3>
            
            <div id="main-countdown" class="flex flex-wrap justify-center gap-4 md:gap-8">
                <div class="countdown-item">
                    <div id="days" class="text-4xl md:text-6xl font-black">00</div>
                    <div class="text-xs uppercase text-slate-500 mt-2">Days</div>
                </div>
                <div class="text-4xl md:text-6xl font-light text-slate-700">:</div>
                <div class="countdown-item">
                    <div id="hours" class="text-4xl md:text-6xl font-black">00</div>
                    <div class="text-xs uppercase text-slate-500 mt-2">Hours</div>
                </div>
                <div class="text-4xl md:text-6xl font-light text-slate-700">:</div>
                <div class="countdown-item">
                    <div id="minutes" class="text-4xl md:text-6xl font-black">00</div>
                    <div class="text-xs uppercase text-slate-500 mt-2">Minutes</div>
                </div>
                <div class="text-4xl md:text-6xl font-light text-slate-700">:</div>
                <div class="countdown-item">
                    <div id="seconds" class="text-4xl md:text-6xl font-black text-blue-400">00</div>
                    <div class="text-xs uppercase text-slate-500 mt-2">Seconds</div>
                </div>
            </div>
        </div>

        <!-- Next Exam Highlight -->
        <div id="next-exam-container" class="hidden mb-10">
            <div class="bg-blue-600/20 border border-blue-500/30 rounded-2xl p-6 flex items-center gap-6">
                <div class="bg-blue-500 p-4 rounded-xl hidden md:block">
                    <i class="fas fa-calendar-check text-2xl text-white"></i>
                </div>
                <div class="flex-1">
                    <span class="text-blue-400 text-xs font-bold uppercase tracking-widest">Next Scheduled Paper</span>
                    <h4 id="next-exam-title" class="text-xl font-bold mt-1">Fetching...</h4>
                    <p id="next-exam-meta" class="text-slate-400 text-sm italic mt-1"></p>
                </div>
                <div class="text-right">
                    <div id="next-exam-date" class="font-mono text-lg font-bold">--.--.----</div>
                    <div id="next-exam-time" class="text-xs text-slate-500">--:--</div>
                </div>
            </div>
        </div>

        <!-- Timetable -->
        <div class="space-y-4">
            <div class="flex items-center justify-between px-2">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-list-ul text-blue-500 text-sm"></i> 
                    Full Schedule
                </h3>
                <span class="text-xs text-slate-500 italic">ICT & FDN Courses</span>
            </div>

            <div id="timetable-grid" class="grid grid-cols-1 gap-4">
                <!-- Data will be injected here -->
            </div>
        </div>

        <footer class="mt-16 text-center text-slate-500 text-sm border-t border-slate-800 pt-8 pb-4">
            <p>&copy; Good Luck for your exams!</p>
        </footer>
    </div>

    <script>
        const examData = [
            { date: "2026-03-30", time: "9.00 - 12.00", code: "FDN 1306", title: "Basic Mathematics for Non Mathematics Students", p: "125", r: "7" },
            { date: "2026-03-31", time: "9.00 - 11.00", code: "FDN 1201", title: "General English", p: "372", r: "39+9+16" },
            { date: "2026-03-31", time: "13.00 - 15.00", code: "FDN 1205", title: "Basic Sciences for Non Sciences Students", p: "127", r: "59" },
            { date: "2026-04-02", time: "9.00 AM Onwards", code: "FDN 1201", title: "General English Oral Test", p: "", r: "" },
            { date: "2026-04-08", time: "9.00 - 12.00", code: "ICT 1402", title: "Principles of Programme Design and Programming", p: "124", r: "180" },
            { date: "2026-04-09", time: "9.00 - 11.00", code: "ICT 1402", title: "Principles of Programme Design and Programming (Pra. Gr. I & II)", p: "124", r: "180" },
            { date: "2026-04-09", time: "11.30 - 13.30", code: "ICT 1402", title: "Principles of Programme Design and Programming (Pra. Gr. III & IV)", p: "", r: "" },
            { date: "2026-04-20", time: "13.00 - 16.00", code: "ICT 1404", title: "Mathematics & Statistics for Computing", p: "124", r: "7" },
            { date: "2026-04-23", time: "9.00 - 11.00", code: "ICT 1201", title: "Fundamentals of Computer Systems", p: "124", r: "4" },
            { date: "2026-05-15", time: "9.00 - 11.00", code: "ICT 1303", title: "Basic Electronics and Digital Logic Design", p: "124", r: "47" }
        ];

        function initApp() {
            renderTimetable();
            updateCountdown();
            setInterval(updateCountdown, 1000);
        }

        function renderTimetable() {
            const container = document.getElementById('timetable-grid');
            const now = new Date();

            container.innerHTML = examData.map(exam => {
                const examDate = new Date(`${exam.date}T${exam.time.split(' ')[0]}`);
                const isPast = examDate < now;
                const isICT = exam.code.startsWith('ICT');

                return `
                    <div class="exam-card glass p-5 flex flex-col md:flex-row items-start md:items-center gap-4 ${isPast ? 'opacity-40 grayscale' : ''}">
                        <div class="flex-shrink-0 w-full md:w-32">
                            <div class="text-xs font-bold ${isICT ? 'text-blue-400' : 'text-emerald-400'} mb-1">${exam.code}</div>
                            <div class="text-sm font-mono text-slate-300">${formatDisplayDate(exam.date)}</div>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-semibold text-slate-100">${exam.title}</h4>
                            <div class="flex items-center gap-3 mt-1 text-xs text-slate-500">
                                <span><i class="far fa-clock mr-1"></i> ${exam.time}</span>
                                ${exam.p ? `<span><i class="fas fa-users mr-1"></i> P: ${exam.p}</span>` : ''}
                                ${exam.r ? `<span><i class="fas fa-door-open mr-1"></i> R: ${exam.r}</span>` : ''}
                            </div>
                        </div>
                        <div class="hidden md:block">
                            ${isPast ? 
                                '<span class="text-[10px] bg-slate-800 text-slate-500 px-2 py-1 rounded uppercase">Completed</span>' : 
                                '<i class="fas fa-chevron-right text-slate-700"></i>'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateCountdown() {
            const now = new Date();
            const firstExam = new Date("2026-03-30T09:00:00");
            const diff = firstExam - now;

            if (diff > 0) {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('days').innerText = d.toString().padStart(2, '0');
                document.getElementById('hours').innerText = h.toString().padStart(2, '0');
                document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
                document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
            } else {
                document.getElementById('main-countdown').innerHTML = "<div class='text-2xl font-bold text-green-400 uppercase tracking-widest animate-pulse'>Exams are in progress!</div>";
            }

            // Find Next Exam
            const next = examData.find(exam => {
                const examTime = exam.time.split(' ')[0];
                const examDateTime = new Date(`${exam.date}T${examTime.includes(':') ? examTime : '09:00'}`);
                return examDateTime > now;
            });

            if (next) {
                document.getElementById('next-exam-container').classList.remove('hidden');
                document.getElementById('next-exam-title').innerText = next.title;
                document.getElementById('next-exam-meta').innerText = `${next.code} • Expected Participation: ${next.p || 'N/A'}`;
                document.getElementById('next-exam-date').innerText = formatDisplayDate(next.date);
                document.getElementById('next-exam-time').innerText = next.time;
            }
        }

        function formatDisplayDate(dateStr) {
            const options = { month: 'short', day: 'numeric', year: 'numeric' };
            return new Date(dateStr).toLocaleDateString('en-US', options);
        }

        window.onload = initApp;
    </script>
</body>
</html>
